services:
  - type: web
    name: st-distribuidora-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: st_distribuidora
          property: host
      - key: DB_PORT
        fromDatabase:
          name: st_distribuidora
          property: port
      - key: DB_NAME
        fromDatabase:
          name: st_distribuidora
          property: database
      - key: DB_USER
        fromDatabase:
          name: st_distribuidora
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: st_distribuidora
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: st_distribuidora
          property: connectionString